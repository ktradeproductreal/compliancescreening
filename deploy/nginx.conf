# Compliance Portal — Nginx site config (drop-in for aaPanel).
#
# ── IMPORTANT: rate-limit zones must live in the http {} block, not here ──
# Add this ONCE to /www/server/nginx/conf/nginx.conf inside the `http { ... }`
# block, then `nginx -t && systemctl reload nginx`:
#
#   limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
#   limit_req_zone $binary_remote_addr zone=apiv2:10m rate=120r/m;
#   limit_req_zone $binary_remote_addr zone=api:10m   rate=600r/m;
#
# Then paste THIS file as the site config (aaPanel → Website → your site →
# Config). The hostname `34-55-250-189.nip.io` is a free wildcard-DNS wrapper
# that resolves to 34.55.250.189. If you later buy a real domain, search-and-
# replace the hostname here and reissue the Let's Encrypt cert in aaPanel.

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 34-55-250-189.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 34-55-250-189.nip.io;

    # SSL — issued by aaPanel via Let's Encrypt (Website → SSL → Let's Encrypt).
    # aaPanel writes the cert under /www/server/panel/vhost/cert/<domain>/ ; if
    # you let aaPanel manage SSL through the UI, these paths get filled in for you.
    ssl_certificate     /www/server/panel/vhost/cert/34-55-250-189.nip.io/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/34-55-250-189.nip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (defense-in-depth alongside helmet on the API).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # NACTA Excel uploads can be sizeable — multer caps at 25 MB.
    client_max_body_size 30m;

    # Built React app
    root  /www/wwwroot/compliance/client/dist;
    index index.html;

    # ── External screening API: tight rate limit ─────────────────────────
    location ~ ^/api/v2/ {
        limit_req zone=apiv2 burst=30 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Login: very tight, brute-force protection ────────────────────────
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Everything else under /api ───────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;            # PDF gen / large list upload parsing
    }

    # ── SPA + hashed asset caching ───────────────────────────────────────
    # Vite emits content-hashed filenames, so static assets can be cached
    # aggressively. index.html stays uncached so deploys are picked up immediately.
    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Block common probes
    location ~ /\.(env|git|ht) { deny all; return 404; }
}
